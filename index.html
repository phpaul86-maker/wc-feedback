<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FBB WC Feedback</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f5f5f5;
      color: black;
      text-align: center;
    }
    .card {
      max-width: 420px;
      margin: auto;
      background: white;
      padding: 24px;
      border-radius: 18px;
      box-shadow: 0 4px 16px #0002;
    }
    button {
      width: 100%;
      font-size: 20px;
      padding: 18px;
      margin: 10px 0;
      color: white;
      border: 0;
      border-radius: 14px;
      cursor: pointer;
    }
    button:disabled {
      background: #777;
      color: #ccc;
      opacity: 0.6;
      cursor: not-allowed;
    }
    .water { background: #78052d; }
    .paper { background: #78052d; }
    .soap { background: #78052d; }
    .dirty { background: #78052d; }
    #status { margin-top: 16px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="card">
    <h1>FBB WC Feedback</h1>
    <p>Helfen Sie uns, ihren Komfort zu verbessern.<br>
    Help us to improve your comfort.</p>

    <button class="water" onclick="sendFeedback('Wasser auf Waschtisch')">💧 Wasser auf Waschtisch <br> Water on sink</button>
    <button class="paper" onclick="sendFeedback('Papier fehlt')">🧻 Papier fehlt <br> No toilet paper</button>
    <button class="soap" onclick="sendFeedback('Seife fehlt')">🧼 Seife fehlt <br> No soap</button>
    <button class="dirty" onclick="sendFeedback('WC ist verschmutzt')">🚽 WC verschmutzt <br> Dirty toilet</button>

    <div id="status"></div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = "https://supabase.paulsflow.cloud";
    const SUPABASE_ANON_KEY = "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJzdXBhYmFzZSIsImlhdCI6MTc2NjQ0MDg2MCwiZXhwIjo0OTIyMTE0NDYwLCJyb2xlIjoiYW5vbiJ9.nHAacT3bTQDWCQvbi4rw8jk2w3AYQddujYMPy8o2YSM";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    const params = new URLSearchParams(window.location.search);
    const locationId = params.get("loc") || "unknown";

    const cooldownMinutes = 30; // ⬅️ HIER stellst du dein Zeitlimit ein
    const voteKey = "wc_feedback_last_" + locationId;
    function isBlocked() {  
    const lastVote = localStorage.getItem(voteKey);  
    if (!lastVote) return false;  
      
    const now = Date.now();  
    const last = Number(lastVote);  
    const cooldownMs = cooldownMinutes * 60 * 1000;  
    
    return now - last < cooldownMs;
    }
    
    // 🔽 Buttons direkt sperren, wenn Zeit noch nicht abgelaufen ist
    
    if (isBlocked()) {  
    document.querySelectorAll("button").forEach(btn => btn.disabled = true);
    document.getElementById("status").innerHTML =    
    "Danke! Du kannst später erneut Feedback geben.<br> Thank you! You can give feedback again later.";}

    window.sendFeedback = async function(type) {
    if (isBlocked()) {
    document.getElementById("status").innerHTML =
    "Du hast vor kurzem bereits Feedback abgegeben.<br> You have already given feedback recently.";
    return;
    }
    document.getElementById("status").innerHTML = "Wird gesendet...<br>Sending...";

      const { error } = await supabase
        .from("feedback")
        .insert({
          type: type,
          source: "qr_web",
          location: locationId,
          created_at: new Date().toISOString()
        });

      if (error) {
        document.getElementById("status").innerHTML = "Fehler beim Senden.<br>Error while sending.";
        console.error(error);
      } else {
      // 🔽 Zeit speichern
      localStorage.setItem(voteKey, Date.now().toString());
      // 🔽 Buttons deaktivieren
      document.querySelectorAll("button").forEach(btn => btn.disabled = true);
      document.getElementById("status").innerHTML = "Danke für dein Feedback!<br> Thank you for your feedback!";
      }
    }
  </script>
</body>
</html>
